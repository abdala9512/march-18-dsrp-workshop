name: Entrenar Modelo y Reportar

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "pyproject.toml"

jobs:
  train-and-compare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v4

      - name: Instalar dependencias
        run: uv sync

      - name: Entrenar modelo challenger
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_USER_TOKEN }}
          DAGSHUB_REPO_OWNER: ${{ vars.DAGSHUB_REPO_OWNER }}
          DAGSHUB_REPO_NAME: ${{ vars.DAGSHUB_REPO_NAME }}
        run: |
          uv run python scripts/train_pipeline.py --model-type random_forest

      - name: Configurar CML
        uses: iterative/setup-cml@v3

      - name: Publicar reporte en PR
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cml comment create report.md
