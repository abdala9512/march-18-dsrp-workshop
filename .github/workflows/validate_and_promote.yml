name: Validar y Promover Challenger

on:
  workflow_dispatch:
    inputs:
      challenger_run_id:
        description: 'MLflow Run ID del modelo Challenger a evaluar'
        required: true
        type: string
      auto_promote:
        description: 'Crear PR de promocion si el Challenger es mejor'
        required: false
        type: boolean
        default: true

jobs:
  validate-and-promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v4

      - name: Instalar dependencias
        run: uv sync

      - name: Validar Challenger contra Champion
        id: validate
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_REPO_OWNER: ${{ vars.DAGSHUB_REPO_OWNER }}
          DAGSHUB_REPO_NAME: ${{ vars.DAGSHUB_REPO_NAME }}
        run: |
          uv run python scripts/validate_challenger.py \
            --challenger-run-id "${{ inputs.challenger_run_id }}" \
            && echo "is_better=true" >> "$GITHUB_OUTPUT" \
            || echo "is_better=false" >> "$GITHUB_OUTPUT"

      - name: Configurar CML
        uses: iterative/setup-cml@v3

      - name: Publicar reporte como resumen del workflow
        run: |
          cat report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Crear PR de promocion
        if: steps.validate.outputs.is_better == 'true' && inputs.auto_promote
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_REPO_OWNER: ${{ vars.DAGSHUB_REPO_OWNER }}
          DAGSHUB_REPO_NAME: ${{ vars.DAGSHUB_REPO_NAME }}
        run: |
          SHORT_ID=$(echo "${{ inputs.challenger_run_id }}" | cut -c1-8)
          BRANCH="promote/challenger-${SHORT_ID}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          # Promover en MLflow y generar champion_info.json
          uv run python scripts/promote_challenger.py \
            --run-id "${{ inputs.challenger_run_id }}"

          git add champion_info.json
          git commit -m "chore: promote challenger ${SHORT_ID} to champion

          Run ID: ${{ inputs.challenger_run_id }}
          Promoted via validate_and_promote workflow"

          git push origin "$BRANCH"

          gh pr create \
            --title "Promote challenger ${SHORT_ID} to champion" \
            --body-file report.md \
            --base main \
            --head "$BRANCH"

      - name: Resultado - Challenger no es mejor
        if: steps.validate.outputs.is_better == 'false'
        run: |
          echo "## ❌ El Champion actual sigue siendo mejor" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "No se creo PR de promocion. El Challenger (run: ${{ inputs.challenger_run_id }}) no supera al Champion actual." >> "$GITHUB_STEP_SUMMARY"
